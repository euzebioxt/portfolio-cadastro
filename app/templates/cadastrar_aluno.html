<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastrar Aluno</title>
</head>

<body>

<h2>Cadastro de Aluno</h2>

<form method="POST">

    <div>
        <label for="nome">Nome:</label><br>
        <input 
            type="text"
            id="nome"
            name="nome"
            placeholder="Digite o nome do aluno"
            required
        >
    </div>

    <br>

    <div>
        <label for="idade">Idade:</label><br>
        <input 
            type="number"
            id="idade"
            name="idade"
            min="5"
            max="100"
            required
        >
    </div>

    <br>

    <div>
        <label for="serie">Série:</label><br>
        <input 
            type="text"
            id="serie"
            name="serie"
            placeholder="Ex: 8º ano"
            required
        >
    </div>

    <br>

    <button type="submit">Cadastrar</button>

</form>

</body>
</html>
