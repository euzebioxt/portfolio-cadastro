<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Lista de Alunos</title>

</head>

<body>

<h2>Lista de Alunos</h2>

<table border="1">

<thead>

<tr>

<th>Nome</th>

<th>Idade</th>

<th>Série</th>

<th>Ações</th>

</tr>

</thead>

<tbody>

{% for aluno in alunos %}

<tr>

<td>{{ aluno.nome }}</td>

<td>{{ aluno.idade }}</td>

<td>{{ aluno.serie }}</td>

<td>

<a href="{{ url_for('editar_aluno', id=aluno.id) }}">

Editar

</a>

|

<a href="{{ url_for('deletar_aluno', id=aluno.id) }}">

Deletar

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</body>

</html>
